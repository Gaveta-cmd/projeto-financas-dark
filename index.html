<!doctype html>
<html lang="pt-BR">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('vf_theme')||'dark';
        var d=(t==='dark')||(t==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
        if(d)document.documentElement.classList.add('dark');
      })();
    </script>
    <meta charset="UTF-8" />
    <!--
      CSP permissivo: `connect-src *` libera Supabase (auth, REST e realtime)
      sem precisar listar domínios específicos. O vercel.json na raiz aplica
      o mesmo CSP via header HTTP em produção como redundância.
      Tudo em uma única linha pra evitar matching quebrado por whitespace.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:;" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ef233c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VibeFinance" />
    <meta name="msapplication-TileColor" content="#18181b" />
    <meta name="application-name" content="VibeFinance" />
    <meta name="description" content="Seu painel financeiro pessoal — controle gastos, metas e reservas." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>VibeFinance — Painel Financeiro</title>
